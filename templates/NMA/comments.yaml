  # --- 3.2.3 Types of interventions (network) ---------------------------
  - id: c-network-decision-supplementary
    anchor:
      en: "### 3.2.3 Types of interventions"
    body: |
      ネットワークのノード設計（どの介入を 1 つにまとめ、どれを分けるか）を最初に決めてください。
      Decision set（意思決定の中心となる介入）と Supplementary set（ネットワークを連結するための
      共通比較対照など）を切り分け、ネットワーク図（Figure 1）に反映させてください。
    audience: [author]

