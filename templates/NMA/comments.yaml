  # --- 3.11 Network meta-analysis ---------------------------------------
  - id: c-nma-model
    anchor:
      en: "## 3.11 Network meta-analysis"
    body: |
      効果指標（OR/RR/MD/SMD）、固定/変量効果、頻度論/ベイズ、使用ソフト（MetaInsight 等）、
      多腕試験の相関の扱いを、解析を始める前に確定させてください。
      MetaInsight: https://crsu.shinyapps.io/MetaInsight/
    audience: [author]

  # --- 3.12 Transitivity ------------------------------------------------
  - id: c-transitivity
    anchor:
      en: "## 3.12 Assessment of the transitivity assumption"
    body: |
      効果修飾因子（effect modifier）を事前に列挙し、比較ごとの分布を確認する計画にしてください。
      推移性が崩れていると判断される場合は NMA を行わず pairwise MA にとどめる、という方針を
      明記しておくと安全です。
    audience: [author]

  # --- 4. Confidence in the evidence (CINeMA) ---------------------------
  - id: c-cinema
    anchor:
      en: "# 4. Confidence in the evidence"
    body: |
      確実性評価は NMA では CINeMA を用います（6 ドメイン: within-study bias, across-studies bias,
      indirectness, imprecision, heterogeneity, incoherence）。
      順位指標（P-score / SUCRA）は不確実性を伴う要約であり、順位だけで結論づけないでください。
    audience: [author, reference]

