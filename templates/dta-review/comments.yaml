# Comments to be attached to the rendered Google Doc for the dta-review
# (diagnostic test accuracy review) protocol template.
#
# One body (Japanese) is attached to BOTH the ja and en Google Docs, using
# language-specific anchor strings to locate the insertion point in each master.
#
# Schema (one entry per comment):
#   - id:          stable identifier (kebab-case). Required.
#     legacy_id:   (optional) numeric id of the corresponding comment in the
#                  2020-03-04 legacy DTA Doc
#                  (resources/20200304_診断精度SRのプロトコルテンプレ.docx).
#     anchor:      text the comment is anchored to. Must appear verbatim in the body.
#       ja:        Japanese anchor string (matched against the ja master).
#       en:        English anchor string (matched against the en master). Omit to
#                  attach the comment only to the ja Doc.
#     occurrence:  (optional, default 1) which occurrence of the anchor string to attach to.
#     body: |
#       Japanese comment text shown in both ja and en Google Docs.
#     audience:    (optional) free-form tags, e.g. [author, mentor, reference].
#
# Notes:
#   - Anchors target SECTION HEADINGS (which are in English in both ja and en
#     masters) so that ja_anchor == en_anchor for most entries.

comments:
  # --- 1. Introduction --------------------------------------------------
  - id: c-introduction-clinical-pathway-ref
    legacy_id: 0
    anchor:
      ja: "# 1. Introduction"
      en: "# 1. Introduction"
    body: |
      https://www.facebook.com/groups/339218557733680/posts/347107986944737
    audience: [reference]

  # --- 3.2 Inclusion criteria ------------------------------------------
  - id: c-inclusion-ref
    legacy_id: 1
    anchor:
      ja: "## 3.2 Inclusion criteria of the studies for the review"
      en: "## 3.2 Inclusion criteria of the studies for the review"
    body: |
      https://www.facebook.com/groups/339218557733680/posts/345690497086486
      （介入とは若干異なる）
    audience: [reference]

