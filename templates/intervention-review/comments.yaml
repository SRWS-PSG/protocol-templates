# Comments to be attached to the rendered Google Doc.
#
# One body (Japanese) is attached to BOTH the ja and en Google Docs, using
# language-specific anchor strings to locate the insertion point in each master.
#
# Schema (one entry per comment):
#   - id:          stable identifier (kebab-case). Required.
#     legacy_id:   (optional) numeric id of the corresponding comment in the
#                  2022-04-30 legacy Doc (resources/legacy_comments_extracted.json).
#     anchor:      text the comment is anchored to. Must appear verbatim in the body.
#       ja:        Japanese anchor string (matched against the ja master).
#       en:        English anchor string (matched against the en master). Omit to
#                  attach the comment only to the ja Doc.
#     occurrence:  (optional, default 1) which occurrence of the anchor string to attach to.
#     body: |
#       Japanese comment text shown in both ja and en Google Docs.
#     audience:    (optional) free-form tags, e.g. [author, mentor, reference].
#
# Notes:
#   - Keep anchor strings short and unique within a section to minimise mis-matches.
#   - The build script strips no markup from anchors; whitespace and punctuation must match.
#   - Multiple comments can share the same anchor; each becomes a separate thread
#     in the Google Doc.
#   - Anchors here target SECTION HEADINGS rather than the inline mentoring-session
#     codes (e.g. 03_04, 14) that the 2022 Doc used, because those codes were
#     removed in the v3 template.

comments:
  # --- Title ------------------------------------------------------------
  - id: c-title-efficacy
    legacy_id: 0
    anchor:
      ja: "*efficacy*"
      en: "*efficacy*"
    body: |
      介入のレビューで、RCT のみを組み入れる場合は "efficacy" をタイトルで使ってください。
      理由:
      https://www.ncbi.nlm.nih.gov/pmc/articles/PMC351867/
    audience: [author]

